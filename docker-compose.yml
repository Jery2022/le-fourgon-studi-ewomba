services:
  db:
    image: postgres:16-alpine
    container_name: le-fourgon-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lefourgon_db}
      POSTGRES_USER: ${POSTGRES_USER:-lefourgon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lefourgon_dev}
    ports:
      - "5432:5432"
    volumes:
      - le-fourgon-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lefourgon} -d ${POSTGRES_DB:-lefourgon_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  le-fourgon-db-data:
